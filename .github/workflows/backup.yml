name: Haftalik Supabase Yedekleme

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Supabase verilerini indir
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          mkdir -p backups
          DATE=$(date +%Y-%m-%d)
          curl -s \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/responses?select=*&order=created_at.asc" \
            -o "backups/responses_${DATE}.json"
          curl -s \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/researcher_feedback?select=*&order=created_at.asc" \
            -o "backups/feedback_${DATE}.json"
          echo "Tamamlandi: ${DATE}"
          echo "Yanit sayisi: $(python3 -c 'import json; d=json.load(open("backups/responses_'${DATE}'.json")); print(len(d) if isinstance(d,list) else "hata")')"

      - name: Commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Otomatik yedekleme - $(date +%Y-%m-%d)"
          git push
