name: Haftalik Supabase Yedekleme

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Supabase verilerini indir
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -e
          mkdir -p backups
          DATE=$(date +%Y-%m-%d)
          if [ -z "$SUPABASE_URL" ]; then echo "ERROR: SUPABASE_URL bos"; exit 1; fi
          if [ -z "$SUPABASE_KEY" ]; then echo "ERROR: SUPABASE_KEY bos"; exit 1; fi
          
          curl --fail --show-error --silent \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            "${SUPABASE_URL}/rest/v1/responses?select=*&order=created_at.asc" \
            -o "backups/responses_${DATE}.json"
          
          curl --fail --show-error --silent \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            "${SUPABASE_URL}/rest/v1/researcher_feedback?select=*&order=created_at.asc" \
            -o "backups/feedback_${DATE}.json"
          
          echo "Tamamlandi: ${DATE}"
          ls -la backups/
          echo "Yanit sayisi: $(python3 -c "import json; print(len(json.load(open('backups/responses_${DATE}.json'))))")"
          echo "Feedback sayisi: $(python3 -c "import json; print(len(json.load(open('backups/feedback_${DATE}.json'))))")"

      - name: Commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "Yedeklenecek yeni veri yok"
          else
            git commit -m "Otomatik yedekleme - $(date +%Y-%m-%d)"
            git push
            echo "Yedek commit edildi"
          fi
